name: Öffentliche Website wiederherstellen

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Repository vollständig laden
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fehlerhaften CMS-Commit zurücknehmen
        run: |
          git config user.name "Website-Rettung"
          git config user.email "actions@users.noreply.github.com"
          git revert --no-edit 0a5dd38

      - name: Wiederherstellung veröffentlichen
        run: git push
