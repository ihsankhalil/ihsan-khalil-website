      - name: Änderungen veröffentlichen
        run: |
          git config user.name "ZENON CMS"
          git config user.email "actions@users.noreply.github.com"

          git add public-content.js

          if git diff --cached --quiet; then
            echo "Keine Änderungen vorhanden."
            exit 0
          fi

          git commit -m "CMS: öffentliche Inhalte aktualisiert"
          git push
